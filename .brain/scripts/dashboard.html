<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orchestra Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0a0a;
  color: #e4e4e7;
  font-family: 'SF Mono', 'Menlo', 'Monaco', 'Cascadia Code', monospace;
  font-size: 13px;
  line-height: 1.5;
  overflow: hidden;
  height: 100vh;
  position: relative;
}

canvas#matrix {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  opacity: 0.06;
  z-index: 0;
  pointer-events: none;
}

.container {
  position: relative;
  z-index: 1;
  max-width: 400px;
  margin: 0 auto;
  padding: 16px;
  height: 100vh;
  overflow-y: auto;
}

/* --- Header --- */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.header-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 2px;
  color: #fff;
}

.status-badge {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  font-weight: 500;
}

.status-idle { background: rgba(113,113,122,0.2); color: #a1a1aa; }
.status-planning { background: rgba(168,85,247,0.15); color: #c084fc; }
.status-executing { background: rgba(34,197,94,0.15); color: #86efac; }
.status-reviewing { background: rgba(251,191,36,0.15); color: #fbbf24; }
.status-done { background: rgba(34,197,94,0.2); color: #4ade80; }
.status-failed { background: rgba(239,68,68,0.2); color: #f87171; }

.indicator {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #22c55e;
  transition: background 0.3s;
}

.indicator.loading { background: #f59e0b; animation: pulse 1s infinite; }
.indicator.error { background: #ef4444; }
.indicator.idle { background: #71717a; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* --- Metrics Row --- */
.metrics {
  display: flex;
  gap: 4px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.metric {
  flex: 1;
  min-width: 80px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  padding: 10px 12px;
  text-align: center;
}

.metric-value {
  font-size: 20px;
  font-weight: 700;
  color: #fff;
}

.metric-value.green { color: #86efac; }
.metric-value.blue { color: #a5d8ff; }
.metric-value.amber { color: #fbbf24; }

.metric-label {
  font-size: 10px;
  color: #71717a;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 2px;
}

/* --- Progress --- */
.progress-section {
  margin-bottom: 16px;
}

.progress-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}

.progress-label {
  font-size: 11px;
  color: #a1a1aa;
  width: 50px;
  flex-shrink: 0;
}

.progress-track {
  flex: 1;
  height: 6px;
  background: rgba(255,255,255,0.06);
  border-radius: 3px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.5s ease;
  background: linear-gradient(90deg, #22c55e, #86efac);
}

.progress-fill.amber {
  background: linear-gradient(90deg, #f59e0b, #fbbf24);
}

.progress-pct {
  font-size: 11px;
  color: #a1a1aa;
  width: 36px;
  text-align: right;
  flex-shrink: 0;
}

/* --- Workers --- */
.section-title {
  font-size: 11px;
  color: #71717a;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: rgba(255,255,255,0.06);
}

.workers-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 16px;
}

.worker-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  padding: 10px 12px;
  transition: border-color 0.2s;
}

.worker-card:hover {
  border-color: rgba(255,255,255,0.12);
}

.worker-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}

.worker-id {
  font-weight: 600;
  color: #fff;
  font-size: 12px;
}

.worker-role {
  font-size: 11px;
  padding: 1px 6px;
  border-radius: 3px;
  background: rgba(165,216,255,0.1);
  color: #a5d8ff;
}

.worker-role.coder { background: rgba(134,239,172,0.1); color: #86efac; }
.worker-role.tester { background: rgba(251,191,36,0.1); color: #fbbf24; }
.worker-role.researcher { background: rgba(168,85,247,0.1); color: #c084fc; }
.worker-role.writer { background: rgba(251,146,60,0.1); color: #fb923c; }
.worker-role.architect { background: rgba(56,189,248,0.1); color: #38bdf8; }
.worker-role.reviewer { background: rgba(244,114,182,0.1); color: #f472b6; }
.worker-role.content_analyst { background: rgba(45,212,191,0.1); color: #2dd4bf; }

.worker-status {
  font-size: 11px;
  display: flex;
  align-items: center;
  gap: 4px;
}

.worker-status-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  display: inline-block;
}

.worker-status-dot.busy { background: #22c55e; }
.worker-status-dot.idle { background: #71717a; }
.worker-status-dot.stuck { background: #f59e0b; }
.worker-status-dot.dead { background: #ef4444; }

.worker-task {
  font-size: 11px;
  color: #a1a1aa;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.worker-heartbeat {
  font-size: 10px;
  color: #52525b;
  margin-top: 2px;
}

/* --- Empty state --- */
.empty-state {
  text-align: center;
  padding: 24px;
  color: #52525b;
  font-size: 12px;
}

/* --- Tokens footer --- */
.tokens-footer {
  border-top: 1px solid rgba(255,255,255,0.06);
  padding-top: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  color: #71717a;
}

.token-group {
  display: flex;
  align-items: center;
  gap: 4px;
}

.token-in { color: #86efac; }
.token-out { color: #a5d8ff; }
.token-cost { color: #fbbf24; }

/* --- Scrollbar --- */
.container::-webkit-scrollbar { width: 4px; }
.container::-webkit-scrollbar-track { background: transparent; }
.container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

/* --- Animations --- */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

.worker-card { animation: fadeIn 0.3s ease; }
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="container">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <span class="logo">ORCHESTRA</span>
      <span id="status-badge" class="status-badge status-idle">idle</span>
    </div>
    <div id="indicator" class="indicator idle"></div>
  </div>

  <!-- Metrics -->
  <div class="metrics">
    <div class="metric">
      <div id="m-workers" class="metric-value green">0</div>
      <div class="metric-label">Воркеры</div>
    </div>
    <div class="metric">
      <div id="m-tasks" class="metric-value blue">0/0</div>
      <div class="metric-label">Задачи</div>
    </div>
    <div class="metric">
      <div id="m-tokens" class="metric-value amber">—</div>
      <div class="metric-label">Токены</div>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-section">
    <div class="progress-row">
      <span class="progress-label">Фаза</span>
      <div class="progress-track">
        <div id="phase-fill" class="progress-fill" style="width: 0%"></div>
      </div>
      <span id="phase-pct" class="progress-pct">—</span>
    </div>
    <div class="progress-row">
      <span class="progress-label">Задачи</span>
      <div class="progress-track">
        <div id="tasks-fill" class="progress-fill amber" style="width: 0%"></div>
      </div>
      <span id="tasks-pct" class="progress-pct">—</span>
    </div>
  </div>

  <!-- Workers -->
  <div class="section-title">Сессии</div>
  <div id="workers-list" class="workers-list">
    <div class="empty-state">Нет активных сессий</div>
  </div>

  <!-- Tokens footer -->
  <div class="tokens-footer">
    <div class="token-group">
      <span class="token-in">↑</span>
      <span id="t-in" class="token-in">—</span>
    </div>
    <span style="color: #3f3f46">·</span>
    <div class="token-group">
      <span class="token-out">↓</span>
      <span id="t-out" class="token-out">—</span>
    </div>
    <span style="color: #3f3f46">·</span>
    <div class="token-group">
      <span class="token-cost">$</span>
      <span id="t-cost" class="token-cost">—</span>
    </div>
  </div>
</div>

<script>
// --- Matrix Rain ---
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789';
const fontSize = 14;
let columns = Math.floor(canvas.width / fontSize);
let drops = Array(columns).fill(1);

function drawMatrix() {
  ctx.fillStyle = 'rgba(10, 10, 10, 0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#22c55e';
  ctx.font = fontSize + 'px monospace';
  for (let i = 0; i < drops.length; i++) {
    const text = chars[Math.floor(Math.random() * chars.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
      drops[i] = 0;
    }
    drops[i]++;
  }
}
setInterval(drawMatrix, 50);

// --- Data fetching ---
function formatTokens(n) {
  if (n == null || isNaN(n)) return '—';
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
  return String(n);
}

function formatCost(n) {
  if (n == null || isNaN(n)) return '—';
  return n.toFixed(2);
}

function timeAgo(iso) {
  if (!iso) return '—';
  const diff = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  if (diff < 0) return 'сейчас';
  if (diff < 60) return diff + 'с назад';
  if (diff < 3600) return Math.floor(diff / 60) + 'м назад';
  return Math.floor(diff / 3600) + 'ч назад';
}

function roleClass(role) {
  const known = ['coder','tester','researcher','writer','architect','reviewer','content_analyst'];
  return known.includes(role) ? role : '';
}

function getTaskTitle(tasks, taskId) {
  if (!taskId || !tasks) return '—';
  const t = tasks.find(t => t.id === taskId);
  return t ? t.title : taskId;
}

function update(data) {
  const { state, workers, tasks, tokens } = data;

  // Indicator
  const ind = document.getElementById('indicator');
  ind.className = 'indicator';
  if (state.status === 'executing') ind.classList.add('loading');
  else if (state.status === 'failed') ind.classList.add('error');
  else if (state.status === 'idle') ind.classList.add('idle');

  // Status badge
  const badge = document.getElementById('status-badge');
  badge.textContent = state.status || 'idle';
  badge.className = 'status-badge status-' + (state.status || 'idle');

  // Metrics
  const activeWorkers = workers.filter(w => w.status === 'busy' || w.status === 'idle').length;
  document.getElementById('m-workers').textContent = activeWorkers;

  const tasksDone = state.tasks_done || 0;
  const tasksTotal = state.tasks_total || tasks.length || 0;
  document.getElementById('m-tasks').textContent = tasksDone + '/' + tasksTotal;

  // Tokens metric
  if (tokens && tokens.totalTokens) {
    document.getElementById('m-tokens').textContent = formatTokens(tokens.totalTokens);
  }

  // Phase progress
  const phase = state.phase || 0;
  const totalPhases = state.total_phases || 1;
  const phasePct = totalPhases > 0 ? Math.round((phase / totalPhases) * 100) : 0;
  document.getElementById('phase-fill').style.width = phasePct + '%';
  document.getElementById('phase-pct').textContent = phase + '/' + totalPhases;

  // Tasks progress
  const taskPct = tasksTotal > 0 ? Math.round((tasksDone / tasksTotal) * 100) : 0;
  document.getElementById('tasks-fill').style.width = taskPct + '%';
  document.getElementById('tasks-pct').textContent = taskPct + '%';

  // Workers list
  const list = document.getElementById('workers-list');
  const aliveWorkers = workers.filter(w => w.status !== 'dead');

  if (aliveWorkers.length === 0) {
    list.innerHTML = '<div class="empty-state">Нет активных сессий</div>';
  } else {
    list.innerHTML = aliveWorkers.map(w => `
      <div class="worker-card">
        <div class="worker-top">
          <div class="worker-status">
            <span class="worker-status-dot ${w.status}"></span>
            <span class="worker-id">${w.id}</span>
          </div>
          <span class="worker-role ${roleClass(w.role)}">${w.role}</span>
        </div>
        <div class="worker-task">${getTaskTitle(tasks, w.current_task)}</div>
        <div class="worker-heartbeat">heartbeat: ${timeAgo(w.last_heartbeat)}</div>
      </div>
    `).join('');
  }

  // Tokens footer
  if (tokens) {
    document.getElementById('t-in').textContent = formatTokens(tokens.inputTokens);
    document.getElementById('t-out').textContent = formatTokens(tokens.outputTokens);
    document.getElementById('t-cost').textContent = formatCost(tokens.totalCost);
  }
}

async function fetchData() {
  try {
    const res = await fetch('/api/data');
    const data = await res.json();
    update(data);
  } catch (e) {
    const ind = document.getElementById('indicator');
    ind.className = 'indicator error';
  }
}

fetchData();
setInterval(fetchData, 5000);
</script>
</body>
</html>
